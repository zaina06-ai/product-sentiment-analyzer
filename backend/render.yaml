services:
  - type: web
    name: product-sentiment-backend
    env: docker
    plan: starter
    region: oregon
    buildCommand: ''
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers=2 --timeout=120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: '0'
      - key: PORT
        value: '5000'

